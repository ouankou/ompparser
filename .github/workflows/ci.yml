name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR: build

jobs:

  build-gcc:
    name: Build & Test (GCC)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-26.04]
        version: [11, 12, 13, 14, 15, 16]
    env:
      CC: gcc-${{ matrix.version }}
      CXX: g++-${{ matrix.version }}
      FC: gfortran-${{ matrix.version }}
      CLANG_FORMAT: clang-format
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex clang-format gcc-${{ matrix.version }} g++-${{ matrix.version }} gfortran-${{ matrix.version }}
      - run: cmake -E rm -rf $BUILD_DIR
      - run: cmake -S . -B $BUILD_DIR -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build $BUILD_DIR -- -j
      - name: Run built-in tests
        run: cd $BUILD_DIR && ctest -R "^builtin_" --output-on-failure
      - name: Run OpenMP VV tests
        run: cd $BUILD_DIR && ctest -R "^openmp_vv_" --output-on-failure
      - name: Run OpenMP Examples tests
        run: cd $BUILD_DIR && ctest -R "^openmp_examples_" --output-on-failure

  build-clang:
    name: Build & Test (Clang)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-26.04]
        version: [21, 22]
    env:
      CC: clang-${{ matrix.version }}
      CXX: clang++-${{ matrix.version }}
      FC: flang-${{ matrix.version }}
      CLANG_FORMAT: clang-format-${{ matrix.version }}
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg wget
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor --yes -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/resolute/ llvm-toolchain-resolute-${{ matrix.version }} main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain-resolute-${{ matrix.version }}.list
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex clang-${{ matrix.version }} clang-format-${{ matrix.version }} flang-${{ matrix.version }}
      - run: cmake -E rm -rf $BUILD_DIR
      - run: cmake -S . -B $BUILD_DIR -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build $BUILD_DIR -- -j
      - name: Run built-in tests
        run: cd $BUILD_DIR && ctest -R "^builtin_" --output-on-failure
      - name: Run OpenMP VV tests
        run: cd $BUILD_DIR && ctest -R "^openmp_vv_" --output-on-failure
      - name: Run OpenMP Examples tests
        run: cd $BUILD_DIR && ctest -R "^openmp_examples_" --output-on-failure

  build-wasm:
    name: Build & Test (WASM)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex python-is-python3
      - run: cmake -E rm -rf build-wasm
      - uses: mymindstorm/setup-emsdk@v16
      - run: emcmake cmake -S . -B build-wasm -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DOMPPARSER_ENABLE_WASM=ON
      - run: cmake --build build-wasm --target ompparser_wasm -- -j
      - name: Run WASM builtin tests
        run: node wasm/tests/run_wasm_builtin_tests.js --js build-wasm/wasm/ompparser.js --wasm build-wasm/wasm/ompparser.wasm

  build-pages:
    name: Build Pages
    runs-on: ubuntu-26.04
    needs: [build-gcc, build-clang, build-wasm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@v7
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake bison flex python-is-python3
      - run: cmake -E rm -rf build-wasm
      - uses: mymindstorm/setup-emsdk@v16
      - run: emcmake cmake -S . -B build-wasm -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DOMPPARSER_ENABLE_WASM=ON
      - run: cmake --build build-wasm --target ompparser_wasm -- -j
      - name: Prepare Pages content
        run: |
          rm -rf dist
          mkdir -p dist
          cp -R web/. dist/
          cp build-wasm/wasm/ompparser.js build-wasm/wasm/ompparser.wasm dist/
      - name: Configure GitHub Pages
        if: ${{ !env.ACT }}
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-26.04
    needs: build-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        id: deployment
        uses: actions/deploy-pages@v5
